# robot_localization EKF - "odom" instance.
# Fuses /wheel/odom only. Publishes odom -> base_link TF and /odometry/filtered
# (world_frame: odom -> local, short-term-accurate, jump-free estimate used by
# controllers / costmaps).
ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    print_diagnostics: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /wheel/odom
    # x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    odom0_config: [true,  true,  false,
                    false, false, true,
                    true,  false, false,
                    false, false, true,
                    false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    transform_time_offset: 0.0
    transform_timeout: 0.0
