# slam_toolbox - LOCALIZATION mode.
# Loads a previously-saved map (set map_file_name via launch argument, pointing
# at the *.posegraph/*.data prefix produced by the mapping-mode map saver) and
# localizes the robot against it.
#
# IMPORTANT (deviates from a stock slam_toolbox localization config):
# transform_publish_period is set to 0.0 so slam_toolbox does NOT broadcast
# map -> odom itself. Instead it only publishes /pose (PoseWithCovarianceStamped).
# The map -> odom TF is owned by the "map" instance of robot_localization's EKF
# (see ekf_map.yaml), which fuses this /pose as an absolute correction on top of
# the odom-instance EKF output. This is the standard robot_localization
# "dual EKF" pattern (normally used to fuse GPS); here SLAM pose plays the role
# GPS normally plays, since it is already expressed in the map frame.
slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: localization

    # Set at launch time: ros2 launch robot_slam slam_localization.launch.py map_file_name:=/path/to/map
    map_file_name: ""
    map_start_pose: [0.0, 0.0, 0.0]

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.0   # disabled on purpose, see note above
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
