yolo_detector_node:
  ros__parameters:
    image_topic: "/image_raw"
    detections_topic: "/detections"
    # vision_ros2_node.py(원본) 호환용 JSON payload 토픽. base_level/dynamic_priority/
    # robot_action 등 risk_db 기반 정보는 이 토픽에서만 제공되고, /detections(DetectionArray)에는
    # 픽셀 bbox만 담겨 SLAM+Nav2 경로생성 파이프라인으로 전달됩니다.
    legacy_json_topic: "vision/detected_objects"

    # Relative path on purpose: matches the convention already used in this
    # project's train.py / test_image.py / vision_ros2_node.py (YOLO('best.pt')).
    # Point this at runs/detect/<name>/weights/best.pt (absolute path recommended
    # once you have a trained model) via an override, e.g.:
    #   ros2 run robot_perception yolo_detector_node --ros-args -p model_path:=/abs/path/best.pt
    model_path: "best.pt"

    # 모델/risk_db class 이름 정합성 확인용 기본 위험 클래스입니다.
    # 실제 action 판단은 risk_db와 아래 unknown-object 로직을 기준으로 합니다.
    target_classes: ["battery", "coin", "lego"]

    # 모델이 레고를 세부 부품 클래스로 출력해도 안전 판단은 lego로 통합합니다.
    # 형식: "model_class:risk_class"
    class_aliases:
      - "C1x1x1:lego"
      - "C2x1x0:lego"
      - "C2x1x1:lego"
      - "C2x2x0:lego"
      - "C2x2x1:lego"
      - "C3x1x0:lego"
      - "C3x1x1:lego"
      - "C3x2x0:lego"
      - "C4x1x0:lego"
      - "C4x1x1:lego"
      - "C4x2x0:lego"
      - "C4x2x1:lego"
      - "H2x2x1:lego"
      - "P1x2x1:lego"
      - "P2x2x1:lego"
      - "P4x2x1:lego"
      - "S1x1x1:lego"
      - "S2x2x0:lego"
      - "S2x2x1:lego"
      - "W2x1x2:lego"
      - "X1x2x1:lego"
      - "X2x2x1:lego"
      - "Z1x1x1:lego"

    confidence_threshold: 0.3
    device: "cpu"          # "cpu" | "0" (first GPU) | ...
    inference_rate_hz: 15.0

    # 오탐을 줄이기 위해 같은 위험물이 stable_detection_frames만큼 연속 확인되어야
    # REMOVE로 확정합니다. 입 근접 EMERGENCY_STOP은 지연 없이 즉시 발행합니다.
    stable_detection_frames: 3
    lost_track_ttl_frames: 5
    track_iou_threshold: 0.3

    # 원본 vision_ros2_node.py의 MediaPipe 입-손 근접(삼킴 위험) 판단 로직.
    # 참고: 이 로봇 웹캠은 지면을 향해 아래로 틸트되어 있어 사람 얼굴이 항상 보이는 각도가
    # 아닐 수 있음 - 실측 후 필요 없으면 enable_pose_risk_scoring: false로 끄면 됨.
    mouth_threshold_px: 120
    mouth_threshold_scale: 4.0
    mouth_min_threshold_px: 60.0
    mouth_max_threshold_px: 180.0
    enable_pose_risk_scoring: true

    # 로봇에 디스플레이가 없는 headless 환경에서는 false로 두세요 (cv2.imshow가 DISPLAY 필요).
    enable_visualization: true

    # risk_db에 없는 클래스는 두 단계로만 추가 분류합니다.
    # 1) bbox가 battery/coin/lego 기준 bbox보다 작으면 unknown_small_object(Level 2)
    # 2) 위 기준에 걸리지 않고 아이 입 크기보다 크면 unknown_large_object(Level 1, NONE)
    enable_unknown_object_risk: true
    unknown_small_object_class_name: "unknown_small_object"
    unknown_large_object_class_name: "unknown_large_object"
    small_object_reference_classes: ["battery", "coin", "lego"]
    small_object_reference_area_scale: 1.0

    # 같은 프레임 안에서 기준 객체(battery/coin/lego)가 안 잡힌 경우의 Level 2 보조 기준입니다.
    # 예: 0.035 = 전체 이미지 면적의 3.5% 이하이면 작은 미확인 물체로 간주.
    small_object_fallback_max_area_ratio: 0.035
    mouth_size_area_scale: 1.0

    # MediaPipe가 입꼬리 좌표를 못 잡은 경우의 Level 1 보조 입 크기 기준입니다.
    # 예: 0.035 = 전체 이미지 면적의 3.5%를 임시 입 크기 bbox 면적으로 사용.
    mouth_fallback_area_ratio: 0.035
