yolo_detector_node:
  ros__parameters:
    image_topic: "/image_raw"
    detections_topic: "/detections"
    # vision_ros2_node.py(원본) 호환용 JSON payload 토픽. base_level/dynamic_priority/
    # robot_action 등 risk_db 기반 정보는 이 토픽에서만 제공되고, /detections(DetectionArray)에는
    # 픽셀 bbox만 담겨 SLAM+Nav2 경로생성 파이프라인으로 전달됩니다.
    legacy_json_topic: "vision/detected_objects"

    # Relative path on purpose: matches the convention already used in this
    # project's train.py / test_image.py / vision_ros2_node.py (YOLO('best.pt')).
    # Point this at runs/detect/<name>/weights/best.pt (absolute path recommended
    # once you have a trained model) via an override, e.g.:
    #   ros2 run robot_perception yolo_detector_node --ros-args -p model_path:=/abs/path/best.pt
    model_path: "best.pt"

    # NOTE: must match whatever this specific model's `model.names` actually
    # outputs. The class list below is the risk_db.py category convention
    # (battery/coin/lego); the lego-piece-shape model trained via data.yaml in
    # this repo instead outputs codes like "c1x1x1" and will not match these
    # names as-is -- update this list (or retrain with these class names) to
    # match your model before relying on the filter.
    target_classes: ["battery", "coin", "lego"]

    confidence_threshold: 0.3
    device: "cpu"          # "cpu" | "0" (first GPU) | ...
    inference_rate_hz: 15.0

    # 원본 vision_ros2_node.py의 MediaPipe 입-손 근접(삼킴 위험) 판단 로직.
    # 참고: 이 로봇 웹캠은 지면을 향해 아래로 틸트되어 있어 사람 얼굴이 항상 보이는 각도가
    # 아닐 수 있음 - 실측 후 필요 없으면 enable_pose_risk_scoring: false로 끄면 됨.
    mouth_threshold_px: 120
    enable_pose_risk_scoring: true

    # 로봇에 디스플레이가 없는 headless 환경에서는 false로 두세요 (cv2.imshow가 DISPLAY 필요).
    enable_visualization: true
